interface:
  display_name: "Git Commit Playbook"
  short_description: "Write clear, structured Git commit messages"
  default_prompt: "Use $git-commit-playbook to inspect the current diff, default to Chinese unless the user or repository already requires another language, and draft a commit message with a required type prefix plus a numbered change list. When showing a git commit command, never output literal \\n in the message body; use real multiline content or multiple -m flags instead."
